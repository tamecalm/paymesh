upstream user_service {
    server 127.0.0.1:50051;
    keepalive 32;
}

upstream wallet_service {
    server 127.0.0.1:50052;
    keepalive 32;
}

server {
    listen 80;
    server_name paymesh.trimz.cc;

    # Redirect HTTP to HTTPS once TLS is provisioned
    # Uncomment after running certbot:
    # return 301 https://$host$request_uri;

    location /user.UserService/ {
        grpc_pass grpc://user_service;
        grpc_set_header Host $host;
        grpc_set_header X-Real-IP $remote_addr;

        # Allow large gRPC payloads
        client_max_body_size 10m;
        grpc_read_timeout 300s;
        grpc_send_timeout 300s;
    }

    location /wallet.WalletService/ {
        grpc_pass grpc://wallet_service;
        grpc_set_header Host $host;
        grpc_set_header X-Real-IP $remote_addr;

        client_max_body_size 10m;
        grpc_read_timeout 300s;
        grpc_send_timeout 300s;
    }

    # Health check
    location / {
        default_type application/json;
        return 200 '{"status":"live","service":"paymesh","timestamp":"$time_iso8601"}';
        add_header Cache-Control "no-store";
    }
}

server {
    listen 443 ssl http2;
    server_name paymesh.trimz.cc;

    # TLS certificates
    # certbot will auto-populate these two lines:
    # ssl_certificate /etc/letsencrypt/live/paymesh.trimz.cc/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/paymesh.trimz.cc/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Health check
    location / {
        default_type application/json;
        return 200 '{"status":"live","service":"paymesh","timestamp":"$time_iso8601"}';
        add_header Cache-Control "no-store";
    }

    location /user.UserService/ {
        grpc_pass grpc://user_service;
        grpc_set_header Host $host;
        grpc_set_header X-Real-IP $remote_addr;
        client_max_body_size 10m;
        grpc_read_timeout 300s;
        grpc_send_timeout 300s;
    }

    location /wallet.WalletService/ {
        grpc_pass grpc://wallet_service;
        grpc_set_header Host $host;
        grpc_set_header X-Real-IP $remote_addr;
        client_max_body_size 10m;
        grpc_read_timeout 300s;
        grpc_send_timeout 300s;
    }
}

upstream user_service {
    server 127.0.0.1:50051;
    keepalive 32;
}

upstream wallet_service {
    server 127.0.0.1:50052;
    keepalive 32;
}

server {
    listen 80;
    server_name paymesh.trimz.cc;

    # Redirect HTTP to HTTPS once TLS is provisioned
    # Uncomment after running certbot:
    # return 301 https://$host$request_uri;

    location /user.UserService/ {
        grpc_pass grpc://user_service;
        grpc_set_header Host $host;
        grpc_set_header X-Real-IP $remote_addr;

        # Allow large gRPC payloads
        client_max_body_size 10m;
        grpc_read_timeout 300s;
        grpc_send_timeout 300s;
    }

    location /wallet.WalletService/ {
        grpc_pass grpc://wallet_service;
        grpc_set_header Host $host;
        grpc_set_header X-Real-IP $remote_addr;

        client_max_body_size 10m;
        grpc_read_timeout 300s;
        grpc_send_timeout 300s;
    }

    # Return gRPC status for unmatched routes
    location / {
        return 404;
    }
}
